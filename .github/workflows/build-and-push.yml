name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get -y install podman

      - name: Log in to Harbor
        run: echo "$HARBOR_PASSWORD" | podman login harbor.nickmessing.com -u "$HARBOR_USERNAME" --password-stdin
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build container image
        run: podman build -t harbor.nickmessing.com/library/finance-tracker:${{ github.sha }} -t harbor.nickmessing.com/library/finance-tracker:latest ./server

      - name: Push image
        run: |
          podman push harbor.nickmessing.com/library/finance-tracker:${{ github.sha }}
          podman push harbor.nickmessing.com/library/finance-tracker:latest

  deploy-frontend:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: ui/pnpm-lock.yaml

      - run: pnpm install
        working-directory: ui

      - run: pnpm build
        working-directory: ui

      - name: Package site
        run: |
          mkdir -p /tmp/site
          echo '{"scope":"public","domain":"finance-tracker","skipCaddyConfig":true}' > /tmp/site/manifest.json
          cp -r ./ui/dist /tmp/site/dist
          tar -czf /tmp/site.tgz -C /tmp/site .

      - name: Deploy
        run: |
          curl -X POST https://deploy.nickmessing.com/push \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            --data-binary @/tmp/site.tgz \
            --fail --show-error
